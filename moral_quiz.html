<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>나의 도덕관 사전 점검</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0ebe0;
    --card: #ffffff;
    --dark: #1a1a2e;
    --lp1: #e05c37;
    --lp1-light: #fff0ec;
    --lp2: #1d4ed8;
    --lp2-light: #eff6ff;
    --lp12: #7c3aed;
    --lp12-light: #f5f3ff;
    --muted: #64748b;
    --border: #e2ddd5;
    --text: #1a1a2e;
    --radius: 18px;
    --shadow: 0 2px 24px rgba(26,26,46,0.10);
    --shadow-lg: 0 8px 40px rgba(26,26,46,0.15);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  #root {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ─────────────────────────── */
  .app-header {
    background: var(--dark);
    color: white;
    padding: 36px 24px 28px;
    position: relative;
    overflow: hidden;
  }

  .app-header::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 220px; height: 220px;
    background: radial-gradient(circle, rgba(224,92,55,0.3) 0%, transparent 70%);
    border-radius: 50%;
  }

  .app-header::after {
    content: '';
    position: absolute;
    bottom: -80px; left: -40px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(29,78,216,0.25) 0%, transparent 70%);
    border-radius: 50%;
  }

  .header-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.05em;
    margin-bottom: 14px;
    position: relative;
    z-index: 1;
  }

  .header-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 32px;
    line-height: 1.2;
    letter-spacing: -0.01em;
    position: relative;
    z-index: 1;
  }

  .header-subtitle {
    font-size: 13px;
    color: rgba(255,255,255,0.65);
    margin-top: 8px;
    position: relative;
    z-index: 1;
  }

  /* ── Main Content ────────────────────── */
  .content {
    flex: 1;
    padding: 20px 16px 32px;
  }

  /* ── Cards ───────────────────────────── */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: var(--shadow);
    margin-bottom: 14px;
  }

  /* ── Topic Tags ──────────────────────── */
  .topic-tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.03em;
    margin-bottom: 14px;
  }
  .tag-lp1 { background: var(--lp1-light); color: var(--lp1); }
  .tag-lp2 { background: var(--lp2-light); color: var(--lp2); }
  .tag-lp12 { background: var(--lp12-light); color: var(--lp12); }

  /* ── Inputs ──────────────────────────── */
  .input-label {
    display: block;
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    margin-bottom: 8px;
    letter-spacing: 0.02em;
  }

  input[type="text"] {
    width: 100%;
    padding: 15px 18px;
    border: 2px solid var(--border);
    border-radius: 14px;
    font-size: 16px;
    font-family: inherit;
    color: var(--text);
    background: #faf9f7;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input[type="text"]:focus {
    border-color: var(--dark);
    box-shadow: 0 0 0 4px rgba(26,26,46,0.08);
  }

  /* ── Buttons ─────────────────────────── */
  .btn {
    display: block;
    width: 100%;
    padding: 16px 20px;
    border: none;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s;
    font-family: inherit;
    letter-spacing: -0.01em;
    text-align: center;
  }

  .btn-dark {
    background: var(--dark);
    color: white;
  }
  .btn-dark:hover { background: #2d2d4e; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(26,26,46,0.25); }
  .btn-dark:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 2px solid var(--border);
  }
  .btn-ghost:hover { background: var(--bg); border-color: #ccc; }

  .btn-sm {
    padding: 11px 16px;
    font-size: 13px;
    border-radius: 10px;
  }

  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 22px;
  }
  .btn-row .btn { flex: 1; margin: 0; }

  /* ── Progress Dots ───────────────────── */
  .progress-dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 14px 0 6px;
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--border);
    transition: all 0.3s;
  }
  .dot.done { background: #94a3b8; }
  .dot.active { width: 24px; border-radius: 4px; background: var(--dark); }

  /* ── Question ────────────────────────── */
  .q-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }

  .q-counter {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .q-text {
    font-size: 16px;
    font-weight: 700;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 22px;
    word-break: keep-all;
  }

  /* ── Options ─────────────────────────── */
  .option-btn {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    width: 100%;
    padding: 14px 16px;
    border: 2px solid var(--border);
    border-radius: 13px;
    margin-bottom: 9px;
    cursor: pointer;
    font-size: 14px;
    line-height: 1.55;
    font-family: inherit;
    font-weight: 500;
    color: var(--text);
    background: #faf9f7;
    text-align: left;
    transition: all 0.15s;
    word-break: keep-all;
  }
  .option-btn:last-child { margin-bottom: 0; }
  .option-btn:hover { border-color: var(--dark); background: white; }
  .option-btn.sel-lp1 { border-color: var(--lp1); background: var(--lp1-light); color: var(--lp1); font-weight: 700; }
  .option-btn.sel-lp2 { border-color: var(--lp2); background: var(--lp2-light); color: var(--lp2); font-weight: 700; }
  .option-btn.sel-lp12 { border-color: var(--lp12); background: var(--lp12-light); color: var(--lp12); font-weight: 700; }

  .opt-circle {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border);
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    background: white;
  }

  .option-btn.sel-lp1 .opt-circle { border-color: var(--lp1); background: var(--lp1); }
  .option-btn.sel-lp2 .opt-circle { border-color: var(--lp2); background: var(--lp2); }
  .option-btn.sel-lp12 .opt-circle { border-color: var(--lp12); background: var(--lp12); }
  .option-btn[class*="sel-"] .opt-circle::after {
    content: '';
    width: 8px; height: 8px;
    background: white;
    border-radius: 50%;
  }

  /* ── Scale ───────────────────────────── */
  .scale-wrap { margin-bottom: 4px; }

  .scale-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
  }

  .scale-btn {
    padding: 12px 4px 10px;
    border: 2px solid var(--border);
    border-radius: 11px;
    cursor: pointer;
    font-size: 10px;
    line-height: 1.4;
    text-align: center;
    background: #faf9f7;
    font-family: inherit;
    font-weight: 600;
    color: var(--muted);
    transition: all 0.15s;
    word-break: keep-all;
  }
  .scale-btn .num { font-size: 18px; font-weight: 900; display: block; margin-bottom: 3px; }
  .scale-btn:hover { border-color: var(--dark); color: var(--dark); background: white; }
  .scale-btn.sel-lp1 { border-color: var(--lp1); background: var(--lp1); color: white; }
  .scale-btn.sel-lp2 { border-color: var(--lp2); background: var(--lp2); color: white; }
  .scale-btn.sel-lp12 { border-color: var(--lp12); background: var(--lp12); color: white; }

  .scale-endlabels {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--muted);
    margin-top: 6px;
    padding: 0 2px;
  }

  /* ── Stats row ───────────────────────── */
  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  .stat-box {
    background: var(--card);
    border-radius: 14px;
    padding: 18px;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .stat-num { font-family: 'Black Han Sans', sans-serif; font-size: 36px; color: var(--dark); }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; font-weight: 700; letter-spacing: 0.03em; }

  /* ── Result bars ─────────────────────── */
  .result-block { margin-bottom: 28px; }
  .result-block:last-child { margin-bottom: 0; }

  .result-q-text {
    font-size: 13px;
    font-weight: 700;
    line-height: 1.6;
    color: var(--text);
    margin-bottom: 12px;
    word-break: keep-all;
  }

  .bar-item { margin-bottom: 9px; }
  .bar-item:last-child { margin-bottom: 0; }

  .bar-meta {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 5px;
  }
  .bar-label { font-size: 12px; color: var(--text); line-height: 1.4; word-break: keep-all; flex: 1; padding-right: 8px; }
  .bar-count { font-size: 11px; color: var(--muted); white-space: nowrap; font-weight: 700; }

  .bar-track {
    height: 28px;
    background: #f1ece3;
    border-radius: 7px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 10px;
    transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    min-width: 0;
  }
  .bar-fill span { color: white; font-size: 11px; font-weight: 700; }
  .fill-lp1 { background: linear-gradient(90deg, #f4a68c, var(--lp1)); }
  .fill-lp2 { background: linear-gradient(90deg, #93c5fd, var(--lp2)); }
  .fill-lp12 { background: linear-gradient(90deg, #c4b5fd, var(--lp12)); }

  .divider { height: 1px; background: var(--border); margin: 20px 0; }

  /* ── Summary ─────────────────────────── */
  .sum-item {
    padding: 12px 14px;
    border-radius: 11px;
    background: #faf8f5;
    margin-bottom: 8px;
    border-left: 3px solid var(--border);
  }
  .sum-item.lp1 { border-color: var(--lp1); }
  .sum-item.lp2 { border-color: var(--lp2); }
  .sum-item.lp12 { border-color: var(--lp12); }
  .sum-q { font-size: 11px; color: var(--muted); margin-bottom: 4px; line-height: 1.5; word-break: keep-all; }
  .sum-a { font-size: 13px; font-weight: 700; color: var(--text); word-break: keep-all; }

  /* ── Animations ──────────────────────── */
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(22px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.04); }
    100% { transform: scale(1); }
  }

  .slide-up { animation: slideUp 0.3s ease forwards; }
  .popped { animation: pop 0.2s ease; }

  /* ── Empty / Loading ─────────────────── */
  .loading-msg, .empty-msg {
    text-align: center;
    padding: 48px 20px;
    color: var(--muted);
  }
  .empty-msg .big { font-size: 44px; margin-bottom: 12px; }
  .empty-msg p { font-size: 14px; line-height: 1.7; }

  /* ── Participants list ───────────────── */
  .participants {
    font-size: 11px;
    color: #aaa;
    line-height: 1.8;
    margin-top: 10px;
    word-break: break-all;
  }

  .reset-btn {
    background: transparent;
    border: none;
    color: #ccc;
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
    padding: 4px 0;
    text-decoration: underline;
    display: block;
    margin: 8px auto 0;
  }
  .reset-btn:hover { color: #f87171; }

  @media (max-width: 380px) {
    .header-title { font-size: 26px; }
    .q-text { font-size: 15px; }
    .scale-btn { font-size: 9px; }
    .scale-btn .num { font-size: 15px; }
  }
</style>
</head>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwY8ZXidMoqBfWzI1jWVxJYzDUU45rHctKQb4d_VJJbyWYrUts01Jcx6ef4zBuQT1zD/exec';

// 축: duty=의무vs결과, actor=행위vs행위자, emotion=감정vs이성, scope=개인vs다수
// score: A선택=+1, B선택=-1
const QS_POOL = [
  // ── 의무 vs 결과 (duty) ──────────────────────────────
  {
    id:'d1', axis:'duty',
    text:'체험학습 날 학교 규정상 스마트폰 지참이 금지인데, 반 애들 대부분이 몰래 챙겨가고 있다. 두 사람의 생각이 다르다.\n\n• A: "규정이 있으면 따라야지. 이유가 있어서 만든 규정이잖아."\n• B: "긴급상황에 연락도 해야 하는데, 현실적으로 필요하면 가져가는 게 맞지."',
    opts:['A', 'B'], score:[1,-1]
  },
  {
    id:'d2', axis:'duty',
    text:'친한 친구가 급식 줄에서 "나 학원 늦는다, 앞에 끼워줘"라고 한다. 두 사람의 생각이 다르다.\n\n• A: "아무리 바빠도 줄은 줄이지. 다들 기다리고 있잖아."\n• B: "어차피 몇 분 차이인데 뭐. 학원 지각하면 더 곤란하잖아."',
    opts:['A', 'B'], score:[1,-1]
  },
  {
    id:'d3', axis:'duty',
    text:'선생님이 숙제 검사를 하는데, 못 해온 친구가 "나 어제 아파서 못 했다고 말해줘"라고 부탁했다. 두 사람의 생각이 다르다.\n\n• A: "미안한데 그건 못 하겠어. 거짓말은 거짓말이니까."\n• B: "친구가 혼나는 것보다는 낫지. 이번 한 번쯤은 괜찮지 않아?"',
    opts:['A', 'B'], score:[1,-1]
  },
  {
    id:'d4', axis:'duty',
    text:'단체 채팅방에서 반 친구를 욕하는 내용이 올라오고 있다. 그 친구와 나는 딱히 친하지 않다. 두 사람의 생각이 다르다.\n\n• A: "보고만 있는 것도 어쩐지 같이 한 것 같아서. 뭐라고 해야 할 것 같아."\n• B: "내가 굳이 나서면 나도 같이 욕 먹을 수 있잖아. 그냥 읽씹하는 게 나아."',
    opts:['A', 'B'], score:[1,-1]
  },
  // ── 행위 vs 행위자 (actor) ──────────────────────────
  {
    id:'a1', axis:'actor',
    text:'방과후 교실 청소가 있었다.\n\n평소에 당번도 잘 안 지키고 청소도 자주 빠지던 아이가, 오늘은 누가 시키지도 않았는데 구석구석 열심히 청소했다.\n평소에 항상 솔선수범해서 청소하던 아이가, 오늘은 몸이 안 좋아서 대충 쓸고 앉아 있었다.\n\n더 도덕적인 사람은?',
    opts:['오늘 열심히 청소한 아이', '평소에 솔선수범하던 아이'], score:[-1,1]
  },
  {
    id:'a2', axis:'actor',
    text:'두 사람 모두 무거운 짐을 들고 힘들어하는 친구를 도와줬다. 평소 모습이 달랐다.\n\n• A: 평소에도 주변을 잘 챙기고 힘든 사람 그냥 못 지나치는 편이라, 자연스럽게 "내가 들어줄게" 했다.\n• B: 보통은 자기 일에만 집중하는 편인데, 그날은 못 본 척이 안 돼서 도왔다.\n\n더 도덕적인 사람은?',
    opts:['A', 'B'], score:[1,-1]
  },
  {
    id:'a3', axis:'actor',
    text:'두 사람이 각각 길에서 지갑을 주웠다. 둘 다 경찰에 신고했다.\n\n• A: 평소에도 정직하고 규칙 잘 지키기로 소문난 아이\n• B: 평소엔 거짓말도 좀 하고 자기 것 챙기기 바쁜 아이\n\n더 도덕적인 사람은?',
    opts:['A', 'B'], score:[1,-1]
  },
  // ── 동기: 감정 vs 의무 (emotion) ──────────────────
  {
    id:'e1', axis:'emotion',
    text:'반 친구가 발표 자료를 못 만들어서 쩔쩔매고 있다. 두 사람 모두 도와줬는데, 이유가 달랐다.\n\n• A: "보고 있으니까 나도 불안하고 안타까워서. 그냥 같이 하자고 했어."\n• B: "팀원이 준비 못 하면 같이 도와줘야지. 그게 맞는 거니까."',
    opts:['A', 'B'], score:[-1,1]
  },
  {
    id:'e2', axis:'emotion',
    text:'오늘 발표를 완전히 망쳐서 엄청 속상해하는 친구 옆에 한참 앉아 있었다. 두 사람 모두 같은 행동을 했는데, 이유가 달랐다.\n\n• A: "보고 있으니까 나까지 마음이 아프더라고. 뭐라도 해주고 싶었어."\n• B: "친구가 힘들 때 옆에 있어주는 게 당연한 거 아냐. 그래야 하니까."',
    opts:['A', 'B'], score:[-1,1]
  },
  {
    id:'e3', axis:'emotion',
    text:'길에서 할머니가 무거운 짐을 들고 계단을 오르고 계셨다. 두 사람 모두 도와드렸는데, 이유가 달랐다.\n\n• A: "너무 힘들어 보여서. 그냥 지나치면 내가 마음이 불편할 것 같았어."\n• B: "도움이 필요한 사람이 있으면 도와야지. 그게 옳은 거니까."',
    opts:['A', 'B'], score:[-1,1]
  },
  // ── 개인 vs 다수 (scope) ────────────────────────────
  {
    id:'s1', axis:'scope',
    text:'기차 선로에 5명이 묶여 있다. 이대로면 기차가 그 5명을 친다. 선로 변환기를 당기면 방향이 바뀌어 5명은 살지만, 그쪽 선로에 있던 1명이 희생된다. 나는 지금 변환기 앞에 서 있다.\n\n• A: "내가 직접 그 1명을 죽게 만드는 거잖아. 그건 못 하겠어."\n• B: "어차피 누군가는 다치는 상황이라면, 더 많은 사람을 살리는 게 낫지 않아?"',
    opts:['A', 'B'], score:[1,-1]
  },
  {
    id:'s2', axis:'scope',
    text:'학교 예산이 부족해서 둘 중 하나만 선택해야 한다.\n\n• A: 휠체어를 쓰는 장애학생 3명을 위한 엘리베이터와 특수 화장실 설치\n• B: 전교생 600명이 함께 쓸 냉난방 시설 교체\n\n더 도덕적인 선택은?',
    opts:['A', 'B'], score:[1,-1]
  },
  {
    id:'s3', axis:'scope',
    text:'학급 회의에서 체험학습 장소를 정하는데 의견이 갈렸다. 다수결로 28명 중 22명이 놀이공원을 원하는데, 나머지 6명은 체력적으로 힘들어서 가기 어렵다고 했다. 두 사람의 생각이 다르다.\n\n• A: "6명도 소중한 우리 반 친구잖아. 다 같이 갈 수 있는 데로 바꿔야 해."\n• B: "그래도 22명이 원하는 거면 그게 반 전체에는 더 좋은 거 아니야?"',
    opts:['A', 'B'], score:[1,-1]
  },
  {
    id:'s4', axis:'scope',
    text:'마을에 전염병이 빠르게 퍼지고 있다. 두 가지 정책을 두고 고민 중이다.\n\n• A: 감염 가능성이 있는 1명을 본인 동의 없이 즉시 격리해서 마을 전체를 보호한다.\n• B: 시간이 걸리더라도 그 사람의 동의를 먼저 구한 뒤 격리를 진행한다.\n\n더 도덕적인 정책은?',
    opts:['A', 'B'], score:[1,-1]
  }
];

// 문항 순서 섞기 (Fisher-Yates)
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
const QS = shuffle(QS_POOL);

// 유형 분석
function analyzeType(answers) {
  const axes = { duty:0, actor:0, emotion:0, scope:0 };
  QS_POOL.forEach(q => {
    const idx = answers[q.id];
    if (idx !== undefined) axes[q.axis] += q.score[idx];
  });

  // 가장 강한 축 찾기
  const types = [
    { key:'duty',    pos:'🏛️ 원칙주의자',   neg:'🌻 결과주의자'  },
    { key:'actor',   pos:'🌿 성품중심자',    neg:'⚡ 행위중심자'  },
    { key:'emotion', pos:'🧠 이성형 인간',   neg:'🌊 공감형 인간' },
    { key:'scope',   pos:'🛡️ 개인권리 수호자', neg:'🌍 최대행복 추구자' }
  ];

  let maxAbs = 0, result = null;
  types.forEach(t => {
    const v = axes[t.key];
    if (Math.abs(v) > maxAbs) { maxAbs = Math.abs(v); result = { t, v }; }
  });

  if (!result || maxAbs < 1) return {
    label: '⚖️ 균형형 탐색자',
    desc: '도덕적 판단에서 한 가지 기준에 치우치지 않아요. 상황에 따라 유연하게 생각하는 편이에요. 수업에서 여러 이론을 배우면 자신의 기준이 더 선명해질 거예요!'
  };

  const label = result.v > 0 ? result.t.pos : result.t.neg;
  const descs = {
    '🏛️ 원칙주의자': '"옳기 때문에 한다"는 기준으로 판단해요. 결과보다 행동의 동기와 원칙을 중요하게 여겨요. 칸트 철학과 비슷한 입장이에요.',
    '🌻 결과주의자': '"더 좋은 결과를 만드는 게 선이다"라고 생각해요. 행동의 의도보다 실제로 얼마나 많은 사람에게 도움이 됐는지를 중시해요. 공리주의와 가까운 입장이에요.',
    '🌿 성품중심자': '"어떤 사람이냐"가 도덕의 핵심이라고 느껴요. 한 번의 행동보다 평소의 됨됨이와 성품을 더 중요하게 봐요. 덕 윤리학과 비슷한 입장이에요.',
    '⚡ 행위중심자': '"무엇을 했느냐"가 도덕의 기준이라고 생각해요. 평소 성격과 관계없이, 지금 이 행동이 옳은지 그른지가 더 중요해요.',
    '🧠 이성형 인간': '감정보다 이성과 원칙에 따라 도덕을 판단해요. 감정이 흔들려도 옳은 일이라면 해야 한다고 생각하는 편이에요.',
    '🌊 공감형 인간': '공감과 감정이 도덕 판단의 출발점이에요. 규칙보다 눈앞의 사람이 느끼는 감정과 관계를 더 중요하게 여겨요.',
    '🛡️ 개인권리 수호자': '다수의 이익보다 한 개인의 권리가 침해되어선 안 된다고 생각해요. 사람을 수단으로 쓰는 건 옳지 않다는 입장이에요.',
    '🌍 최대행복 추구자': '더 많은 사람에게 더 많은 행복이 돌아가는 게 옳다고 생각해요. 전체의 이익을 위해 일부를 조정하는 걸 수용하는 편이에요.'
  };

  return { label, desc: descs[label] || '' };
}

let S = { screen:'home', name:'', qi:0, ans:{} };

/* ── Storage (Google Sheets) ─────── */
async function loadAll() {
  try {
    const res = await fetch(GAS_URL + '?action=get&t=' + Date.now());
    const json = await res.json();
    const rows = json.data || [];
    if (rows.length < 2) return [];
    const header = rows[0];
    return rows.slice(1).map(r => {
      const ans = {};
      QS_POOL.forEach(q => {
        const col = header.indexOf(q.id);
        if (col >= 0 && r[col] !== '') ans[q.id] = Number(r[col]);
      });
      return { name: r[1], ts: r[0], answers: ans };
    });
  } catch(e) { return []; }
}
async function saveOne(obj) {
  await fetch(GAS_URL, {
    method: 'POST',
    mode: 'no-cors',
    body: JSON.stringify({ name: obj.name, answers: obj.answers }),
    headers: { 'Content-Type': 'text/plain' }
  });
  // no-cors 모드에서는 응답을 읽을 수 없으므로 성공으로 간주
}
async function resetAll() {
  alert('초기화는 Google Sheets에서 직접 행을 삭제해주세요.');
}

/* ── Helpers ─────────────────────── */
function tagClass(t) { return t==='lp1'?'lp1':t==='lp2'?'lp2':'lp12'; }
function selClass(t) { return `sel-${tagClass(t)}`; }
function fillClass(t) { return `fill-${tagClass(t)}`; }
function answerLabel(q, idx) {
  return q.opts[idx] ?? '-';
}

/* ── Render root ─────────────────── */
const root = () => document.getElementById('root');

function go(screen) {
  S.screen = screen;
  if (screen === 'results') { showResults(); return; }
  renderScreen();
}

function renderScreen() {
  root().innerHTML = '';
  root().className = 'slide-up';
  void root().offsetHeight; // reflow

  if (S.screen === 'home')     root().innerHTML = homeHTML();
  else if (S.screen === 'quiz') root().innerHTML = quizHTML();
  else if (S.screen === 'done') root().innerHTML = doneHTML();

  attachListeners();
}

/* ── Home ────────────────────────── */
function homeHTML() {
  return `
    <div class="app-header">
      <div class="header-badge">🧭 도덕 사전 점검</div>
      <div class="header-title">다음 중<br>도덕적인<br>사람은?</div>
      <div class="header-subtitle">정답 없음 · 지금 내 직관대로 골라주세요</div>
    </div>
    <div class="content">
      <div class="card slide-up">
        <p style="font-size:14px;color:var(--muted);line-height:1.8;margin-bottom:20px;">
          총 14문항 · 정답이 없습니다 😊<br>지금 내 솔직한 생각을 골라주세요!
        </p>
        <label class="input-label">학번</label>
        <input type="text" id="name-input" placeholder="예: 20301" maxlength="20" autocomplete="off">
        <div style="height:14px"></div>
        <button class="btn btn-dark" id="start-btn" onclick="startQuiz()" disabled>
          ✏️ 퀴즈 시작하기
        </button>
        <div style="height:10px"></div>
        <button class="btn btn-ghost" onclick="go('results')">
          📊 전체 결과 보기
        </button>
      </div>
    </div>`;
}

function attachListeners() {
  const ni = document.getElementById('name-input');
  const sb = document.getElementById('start-btn');
  if (ni && sb) {
    ni.addEventListener('input', () => { sb.disabled = ni.value.trim() === ''; });
    ni.addEventListener('keydown', e => { if(e.key==='Enter' && ni.value.trim()) startQuiz(); });
  }
}

function startQuiz() {
  const ni = document.getElementById('name-input');
  if (!ni || !ni.value.trim()) return;
  S.name = ni.value.trim();
  S.qi = 0;
  S.ans = {};
  S.screen = 'quiz';
  renderScreen();
}

/* ── Quiz ────────────────────────── */
function quizHTML() {
  const q = QS[S.qi];
  const ans = S.ans[q.id];
  const hasAns = ans !== undefined;
  const isLast = S.qi === QS.length - 1;
  const tc = 'lp12';

  const dotsHTML = QS.map((_,i) => {
    let cls = 'dot';
    if (i < S.qi) cls += ' done';
    else if (i === S.qi) cls += ' active';
    return `<div class="${cls}"></div>`;
  }).join('');

  const qTextFormatted = q.text.replace(/\n/g, '<br>');

  let optsHTML = '';
  optsHTML = q.opts.map((opt, i) => {
    const sel = ans===i ? `sel-${tc}` : '';
    return `<button class="option-btn ${sel}" onclick="pick(${i})" data-i="${i}">
      <span class="opt-circle"></span>
      <span>${opt}</span>
    </button>`;
  }).join('');

  return `
    <div class="app-header">
      <div class="header-badge">✏️ ${S.name}</div>
      <div class="header-title">${S.qi+1}<span style="font-family:'Noto Sans KR';font-size:18px;font-weight:400;opacity:0.5"> / ${QS.length}</span></div>
      <div class="header-subtitle">솔직하게 골라주세요 — 정답은 없어요</div>
    </div>
    <div class="content">
      <div class="progress-dots">${dotsHTML}</div>
      <div class="card slide-up">
        <div class="q-meta">
          <span class="q-counter" style="font-size:13px;font-weight:700;color:var(--muted);">Q${S.qi+1} / ${QS.length}</span>
        </div>
        <div class="q-text">${qTextFormatted}</div>
        ${optsHTML}
        <div class="btn-row">
          ${S.qi > 0 ? `<button class="btn btn-ghost" onclick="prevQ()" style="flex:1">← 이전</button>` : ''}
          <button class="btn btn-dark" onclick="${isLast?'submit()':'nextQ()'}"
            ${!hasAns?'disabled':''} style="flex:2">
            ${isLast ? '✅ 제출하기' : '다음 →'}
          </button>
        </div>
      </div>
    </div>`;
}

function pick(idx) {
  const q = QS[S.qi];
  S.ans[q.id] = idx;
  // Animate the card
  const card = document.querySelector('.card');
  if (card) { card.classList.add('popped'); setTimeout(() => card.classList.remove('popped'), 200); }
  renderScreen();
}

function nextQ() { if (S.qi < QS.length-1) { S.qi++; renderScreen(); } }
function prevQ() { if (S.qi > 0) { S.qi--; renderScreen(); } }

async function submit() {
  const allDone = QS.every(q => S.ans[q.id] !== undefined);
  if (!allDone) { alert('모든 문항에 답해주세요!'); return; }
  try {
    await saveOne({ name: S.name, ts: new Date().toISOString(), answers: {...S.ans} });
    S.screen = 'done';
    renderScreen();
  } catch(e) {
    alert('저장 오류가 발생했습니다. 다시 시도해주세요.');
  }
}

/* ── Done ────────────────────────── */
function doneHTML() {
  const type = analyzeType(S.ans);
  const summaryHTML = QS.map(q => {
    const aLabel = q.opts[S.ans[q.id]] ?? '-';
    const shortQ = q.text.replace(/\n/g,' ');
    const shortQTrim = shortQ.length > 40 ? shortQ.slice(0,40)+'…' : shortQ;
    return `<div class="sum-item lp12">
      <div class="sum-q">Q. ${shortQTrim}</div>
      <div class="sum-a">→ ${aLabel}</div>
    </div>`;
  }).join('');

  return `
    <div class="app-header">
      <div class="header-badge">🎉 분석 완료</div>
      <div class="header-title">${S.name} 님의<br>도덕관 유형</div>
      <div class="header-subtitle">내 선택이 보여주는 가치관</div>
    </div>
    <div class="content">
      <div class="card slide-up" style="text-align:center;padding:30px 24px;">
        <div style="font-size:52px;margin-bottom:12px;">${type.label.split(' ')[0]}</div>
        <div style="font-family:'Black Han Sans',sans-serif;font-size:24px;color:var(--dark);margin-bottom:16px;">${type.label.split(' ').slice(1).join(' ')}</div>
        <div style="font-size:14px;color:var(--muted);line-height:1.8;text-align:left;background:#faf8f5;padding:16px;border-radius:12px;">${type.desc}</div>
      </div>
      <div class="card slide-up">
        <p style="font-size:13px;font-weight:700;margin-bottom:14px;color:var(--muted);">📋 내 응답 요약</p>
        ${summaryHTML}
        <div style="height:16px"></div>
        <button class="btn btn-dark" onclick="go('results')">📊 우리 반 전체 결과 보기</button>
      </div>
    </div>`;
}

/* ── Results ─────────────────────── */
async function showResults() {
  root().innerHTML = `<div class="loading-msg">📊 집계 중…</div>`;
  const all = await loadAll();
  const n = all.length;

  function agg(qid) {
    const c = {};
    all.forEach(r => {
      const v = r.answers[qid];
      if (v !== undefined) c[v] = (c[v]||0) + 1;
    });
    return c;
  }

  const blocksHTML = QS.map(q => {
    const tc = 'lp12';
    const counts = agg(q.id);
    const numOpts = q.opts.length;
    const labels = q.opts;

    const barsHTML = Array.from({length:numOpts}, (_,i) => {
      const cnt = counts[i] || 0;
      const pct = n > 0 ? Math.round(cnt/n*100) : 0;
      const lbl = labels[i];
      const shortLbl = lbl.length > 22 ? lbl.slice(0,22)+'…' : lbl;
      return `
        <div class="bar-item">
          <div class="bar-meta">
            <span class="bar-label">${shortLbl}</span>
            <span class="bar-count">${cnt}명 ${pct>0?'('+pct+'%)':''}</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill fill-${tc}" style="width:${pct}%">
              ${pct>=12?`<span>${pct}%</span>`:''}
            </div>
          </div>
        </div>`;
    }).join('');

    return `
      <div class="result-block">
        <div class="result-q-text">${q.text.replace(/\n/g,'<br>')}</div>
        ${barsHTML}
      </div>
      <div class="divider"></div>`;
  }).join('');

  const names = all.map(r=>r.name).join(' · ');

  root().innerHTML = `
    <div class="app-header">
      <div class="header-badge">📊 실시간 결과</div>
      <div class="header-title">우리 반이<br>선택한<br>도덕적 인물</div>
      <div class="header-subtitle">전체 응답 집계 현황</div>
    </div>
    <div class="content">
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-num">${n}</div>
          <div class="stat-label">참여 인원</div>
        </div>
        <div class="stat-box">
          <div class="stat-num">${QS.length}</div>
          <div class="stat-label">문항 수</div>
        </div>
      </div>
      ${n > 0 ? `
        <div class="card slide-up">
          ${blocksHTML}
          ${names ? `<p class="participants">참여: ${names}</p>` : ''}
        </div>
      ` : `
        <div class="card slide-up">
          <div class="empty-msg">
            <div class="big">🤔</div>
            <p>아직 제출한 학생이 없습니다.<br>먼저 퀴즈에 참여해보세요!</p>
          </div>
        </div>
      `}
      <button class="btn btn-ghost btn-sm" onclick="showResults()" style="margin-bottom:10px;">🔄 새로고침</button>
      <button class="btn btn-ghost btn-sm" onclick="go('home')">← 처음으로</button>
      <button class="reset-btn" onclick="resetAll()">🗑 데이터 초기화 (교사용)</button>
    </div>`;
}

/* ── Boot ────────────────────────── */
renderScreen();
</script>
</body>
</html>
